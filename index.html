<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKDAV Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #7f1d1d; /* Dim Red Background */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        /* The White Platform */
        .card {
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        h1 { color: #1a73e8; font-size: 1.7rem; margin-top: 0; margin-bottom: 5px; }
        p { color: #5f6368; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.4; }

        /* Hide pages initially */
        #page2, #page3 { display: none; }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #dadce0;
            background: #f8fafc;
            color: #333;
            box-sizing: border-box;
            font-size: 1rem;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
        }

        /* Standard Submit Button */
        .btn {
            background-color: #34a853;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
        }
        .btn:hover { background-color: #1e8e3e; }

        /* Navigation Button */
        .nav-btn {
            background-color: transparent;
            color: #1a73e8;
            border: 1px solid #1a73e8;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
        }
        .nav-btn:hover { background-color: rgba(26, 115, 232, 0.05); }

        /* Big Options for Home Page */
        .option-btn {
            background-color: #f8fafc;
            color: #1a73e8;
            border: 2px solid #1a73e8;
            padding: 20px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
            display: block;
            box-sizing: border-box;
        }
        .option-btn:hover { background-color: #1a73e8; color: white; transform: translateY(-2px); }

        .back-btn {
            color: #5f6368;
            font-size: 0.9rem;
            margin-top: 20px;
            cursor: pointer;
            text-decoration: underline;
            display: inline-block;
        }
    </style>
</head>
<body>

    <form action="https://formspree.io/f/xjgpeyvq" method="POST" class="card">
        
        <input type="hidden" name="Message_Type" id="message_type" value="">

        <div id="page1">
            <h1>Verification</h1>
            <p>Please verify your identity to enter.</p>
            
            <input type="text" name="First_Name" id="fname" placeholder="First Name" required>
            <input type="text" name="Last_Name" id="lname" placeholder="Last Name" required>
            <input type="email" name="Email" id="email" placeholder="Gmail Address" required>
            
            <button type="button" class="nav-btn" onclick="goToHome()">Log In</button>
        </div>

        <div id="page2">
            <h1>MKDAV Public School</h1>
            <p>Welcome. Please select an option below.</p>
            
            <div class="option-btn" onclick="openForm('Confession')">🗣️ Confess</div>
            <div class="option-btn" onclick="openForm('Feedback')">📝 Feedback</div>
        </div>

        <div id="page3">
            <h1 id="dynamic_title">Room</h1>
            <p id="dynamic_desc">Write your message below.</p>
            
            <textarea id="dynamic_box" name="Message" rows="6" placeholder="..." required></textarea>
            
            <button type="submit" class="btn">Submit</button>
            <br>
            <span class="back-btn" onclick="goBackToHome()">← Back to Home</span>
        </div>

    </form>

    <script>
        function goToHome() {
            // Check if Page 1 fields are full
            let fName = document.getElementById('fname').value;
            let lName = document.getElementById('lname').value;
            let email = document.getElementById('email').value;

            if (fName !== "" && lName !== "" && email !== "") {
                document.getElementById('page1').style.display = 'none';
                document.getElementById('page2').style.display = 'block';
            } else {
                alert("Please fill out your Name and Email to continue.");
            }
        }

        function openForm(type) {
            // Hide Home, Show Form
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page3').style.display = 'block';

            // Change the text and tags based on what they clicked!
            if (type === 'Confession') {
                document.getElementById('dynamic_title').innerText = "Confession Room";
                document.getElementById('dynamic_desc').innerText = "Write your confession here with anonymity.";
                document.getElementById('dynamic_box').placeholder = "I confess that...";
                document.getElementById('message_type').value = "🚨 CONFESSION";
                document.getElementById('dynamic_box').name = "Confession_Text";
            } else if (type === 'Feedback') {
                document.getElementById('dynamic_title').innerText = "School Feedback";
                document.getElementById('dynamic_desc').innerText = "Help us improve MKDAV.";
                document.getElementById('dynamic_box').placeholder = "My feedback is...";
                document.getElementById('message_type').value = "💡 FEEDBACK";
                document.getElementById('dynamic_box').name = "Feedback_Text";
            }
        }

        function goBackToHome() {
            document.getElementById('page3').style.display = 'none';
            document.getElementById('page2').style.display = 'block';
            // Clear the text box if they go back
            document.getElementById('dynamic_box').value = ""; 
        }
    </script>

</body>
</html>
